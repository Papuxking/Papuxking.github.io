server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: todas las rutas sirven index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Headers COOP/COEP requeridos por exportaciones web de Godot 4 (SharedArrayBuffer / WASM threads)
    location ~* \.(wasm|pck|js)$ {
        add_header Cross-Origin-Opener-Policy  "same-origin"   always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        gzip off;  # WASM no se comprime bien con gzip estándar
    }

    # Cache largo para assets estáticos
    location ~* \.(png|jpg|gif|ico|svg|webp|ogg|mp3|wav)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Sin cache para HTML (siempre fresco)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
