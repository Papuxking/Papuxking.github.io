version: '3.9'

services:
  godotcraft:
    image: nginx:alpine
    container_name: godotcraft-dev
    ports:
      - "8080:80"               # Accede en http://localhost:8080
    volumes:
      - ../:/usr/share/nginx/html:ro    # Bind mount: edita y recarga el browser
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

# ── Uso ──────────────────────────────────────
#  Desde la carpeta docker/:
#    docker compose up
#  Luego abre http://localhost:8080
#  Los cambios en index.html se reflejan al recargar el browser (F5)
