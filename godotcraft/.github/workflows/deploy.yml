name: Deploy GodotCraft to GitHub Pages

on:
  push:
    branches:
      - main        # Se activa en cada push a main
  workflow_dispatch: # Permite lanzarlo manualmente desde GitHub

# Permisos necesarios para desplegar en Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Solo un despliegue a la vez
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Subir artefacto (sitio estático)
        uses: actions/upload-pages-artifact@v3
        with:
          # Sube todo el repositorio como sitio estático
          path: '.'

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
